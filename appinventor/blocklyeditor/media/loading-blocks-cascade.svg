<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 170" width="210" height="170">
  <defs>
    <style>
      .cas-b1 { animation: casFall1 3.5s ease-in infinite; }
      .cas-b2 { animation: casFall2 3.5s ease-in infinite; }
      .cas-b3 { animation: casFall3 3.5s ease-in infinite; }
      .cas-b4 { animation: casFall4 3.5s ease-in infinite; }
      .cas-b5 { animation: casFall5 3.5s ease-in infinite; }
      @keyframes casFall1 {
        0%   { transform: translateY(-120px) rotate(-8deg); opacity: 0; }
        4%   { opacity: 1; }
        14%  { transform: translateY(4px) rotate(0deg); }
        18%, 72% { transform: translateY(0) rotate(0deg); opacity: 1; }
        85%, 100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes casFall2 {
        0%, 8% { transform: translateY(-120px) rotate(6deg); opacity: 0; }
        12%  { opacity: 1; }
        22%  { transform: translateY(4px) rotate(0deg); }
        26%, 72% { transform: translateY(0) rotate(0deg); opacity: 1; }
        85%, 100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes casFall3 {
        0%, 16% { transform: translateY(-120px) rotate(-5deg); opacity: 0; }
        20%  { opacity: 1; }
        30%  { transform: translateY(4px) rotate(0deg); }
        34%, 72% { transform: translateY(0) rotate(0deg); opacity: 1; }
        85%, 100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes casFall4 {
        0%, 24% { transform: translateY(-120px) rotate(7deg); opacity: 0; }
        28%  { opacity: 1; }
        38%  { transform: translateY(4px) rotate(0deg); }
        42%, 72% { transform: translateY(0) rotate(0deg); opacity: 1; }
        85%, 100% { transform: translateY(180px); opacity: 0; }
      }
      @keyframes casFall5 {
        0%, 32% { transform: translateY(-120px) rotate(-4deg); opacity: 0; }
        36%  { opacity: 1; }
        46%  { transform: translateY(4px) rotate(0deg); }
        50%, 72% { transform: translateY(0) rotate(0deg); opacity: 1; }
        85%, 100% { transform: translateY(180px); opacity: 0; }
      }
      .bt { font-family: sans-serif; font-size: 11px; font-weight: bold; fill: #fff; }
    </style>
  </defs>

  <!-- W=155 H=26 R=8. Spacing=26. -->

  <!-- Block 1: Event (gold) — no notch, tab. y=8 -->
  <g transform="translate(25, 8)">
    <g class="cas-b1">
      <path transform="translate(1,1)" fill="#8e722a"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 147 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="#b18e35" stroke="none"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 147 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="none" stroke="#c8b072" stroke-width="1"
        d="m 0.5,7.5 a 7.5 7.5 0 0,1 7.5,-7 H 155 M 0.5,18 V 8"/>
      <text class="bt" x="14" y="17">when .Initialize</text>
    </g>
  </g>

  <!-- Block 2: Logic (green) — y=8+26=34 -->
  <g transform="translate(25, 34)">
    <g class="cas-b2">
      <path transform="translate(1,1)" fill="#5f8934"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="#77AB41" stroke="none"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="none" stroke="#a3c47e" stroke-width="1"
        d="m 0.5,7.5 a 7.5 7.5 0 0,1 7.5,-7 H 15 l 6,4 3,0 6,-4 H 155 M 0.5,18 V 8"/>
      <text class="bt" x="38" y="17">if  result  then</text>
    </g>
  </g>

  <!-- Block 3: Variable (orange) — y=34+26=60 -->
  <g transform="translate(25, 60)">
    <g class="cas-b3">
      <path transform="translate(1,1)" fill="#a64c24"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="#D05F2D" stroke="none"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="none" stroke="#de9673" stroke-width="1"
        d="m 0.5,7.5 a 7.5 7.5 0 0,1 7.5,-7 H 15 l 6,4 3,0 6,-4 H 155 M 0.5,18 V 8"/>
      <text class="bt" x="38" y="17">set  count  to</text>
    </g>
  </g>

  <!-- Block 4: Math (blue) — y=60+26=86 -->
  <g transform="translate(25, 86)">
    <g class="cas-b4">
      <path transform="translate(1,1)" fill="#325a91"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="#3F71B5" stroke="none"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -125 l -6,4 -3,0 -6,-4 h -7 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="none" stroke="#7fa1cc" stroke-width="1"
        d="m 0.5,7.5 a 7.5 7.5 0 0,1 7.5,-7 H 15 l 6,4 3,0 6,-4 H 155 M 0.5,18 V 8"/>
      <text class="bt" x="38" y="17">  x  +  1</text>
    </g>
  </g>

  <!-- Block 5: Procedure (purple) — notch, no tab. y=86+26=112 -->
  <g transform="translate(25, 112)">
    <g class="cas-b5">
      <path transform="translate(1,1)" fill="#63426a"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -147 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="#7c5385" stroke="none"
        d="m 0,0 m 0,8 a 8 8 0 0,1 8,-8 h 7 l 6,4 3,0 6,-4 h 125 V 26 h -147 a 8 8 0 0,1 -8,-8 z"/>
      <path fill="none" stroke="#a387aa" stroke-width="1"
        d="m 0.5,7.5 a 7.5 7.5 0 0,1 7.5,-7 H 15 l 6,4 3,0 6,-4 H 155 M 0.5,18 V 8"/>
      <text class="bt" x="38" y="17">call  doSomething</text>
    </g>
  </g>
</svg>
